<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="calc">
  <div class="screen">
    <div class="expr" id="expr"></div>
    <div class="num" id="num">0</div>
  </div>

  <div class="keys" id="keys">
    <button class="btn btn-gray"   data-action="ac">AC</button>
    <button class="btn btn-gray"   data-action="sign">+/-</button>
    <button class="btn btn-gray"   data-action="pct">%</button>
    <button class="btn btn-orange" data-action="op" data-op="/">÷</button>

    <button class="btn btn-dark"   data-action="num" data-val="7">7</button>
    <button class="btn btn-dark"   data-action="num" data-val="8">8</button>
    <button class="btn btn-dark"   data-action="num" data-val="9">9</button>
    <button class="btn btn-orange" data-action="op" data-op="*">×</button>

    <button class="btn btn-dark"   data-action="num" data-val="4">4</button>
    <button class="btn btn-dark"   data-action="num" data-val="5">5</button>
    <button class="btn btn-dark"   data-action="num" data-val="6">6</button>
    <button class="btn btn-orange" data-action="op" data-op="-">−</button>

    <button class="btn btn-dark"   data-action="num" data-val="1">1</button>
    <button class="btn btn-dark"   data-action="num" data-val="2">2</button>
    <button class="btn btn-dark"   data-action="num" data-val="3">3</button>
    <button class="btn btn-orange" data-action="op" data-op="+">+</button>

    <button class="btn btn-dark btn-zero" data-action="num" data-val="0">0</button>
    <button class="btn btn-dark"   data-action="dot">.</button>
    <button class="btn btn-orange" data-action="eq">=</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
